https://github.com/chadharsahib01/Faceswapper/new/main
name: Deploy to Vercel & Hugging Face

on:
  push:
    branches:
      - main

jobs:
  deploy-huggingface:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
      - name: Push to Hugging Face
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }} # Add your HF token to GitHub Secrets
        run: |
          git remote add hf https://user:$HF_TOKEN@huggingface.co/spaces/chadharsahib/face-swap-api
          git push -f hf main
