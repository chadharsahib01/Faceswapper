name: Deploy to Vercel & Hugging Face

on:
  push:
    branches:
      - main

jobs:
  deploy-huggingface:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0  # CRITICAL: Fetches full history so the push doesn't fail

      - name: Push to Hugging Face
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
        run: |
          git remote add hf https://chadharsahib:$HF_TOKEN@huggingface.co/spaces/chadharsahib/face-swap-api
          git push -f hf main
